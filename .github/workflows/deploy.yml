name: Deploy to GitHub Pages

# Builda e publica o site sempre que /data ou /web mudam na branch main.
# O pipeline Python roda LOCALMENTE; aqui só transformamos os JSON em HTML.
# Nenhuma chave de API é usada neste workflow.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez; cancela builds antigos em andamento.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build estático (next export)
        run: npm run build

      - name: Desativar Jekyll (serve a pasta _next)
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
